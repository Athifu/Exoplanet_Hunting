<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-image: url('https://assets.science.nasa.gov/dynamicimage/assets/science/astro/exo-explore/2023/09/h/holiday16x9.jpg?w=1600&h=900&fit=clip&crop=faces%2Cfocalpoint');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background-color: rgba(0, 0, 0, 0.75);
      padding: 2rem;
      border-radius: 10px;
      color: white;
      width: 300px;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
    }

    .login-box h2 {
      text-align: center;
      margin-bottom: 1rem;
    }

    .login-box input {
      width: 100%;
      padding: 0.7rem;
      margin: 0.5rem 0;
      border: none;
      border-radius: 5px;
    }

    .login-box button {
      width: 100%;
      padding: 0.7rem;
      background-color: #2563eb;
      border: none;
      border-radius: 5px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 1rem;
    }

    .login-box button:hover {
      background-color: #1e40af;
    }
  </style>
</head>
<body>

  <form class="login-box" onsubmit="handleLogin(event)">
    <h2>Login</h2>
    <input type="email" id="login-email" placeholder="Email" required />
    <input type="password" id="login-pass" placeholder="Password" required />
    <button type="submit">Login</button>
  </form>

  <script>
    function handleLogin(event) {
      event.preventDefault();
      const email = document.getElementById("login-email").value;
      const password = document.getElementById("login-pass").value;

      if (email && password) {
        window.location.href = "dashboard.html";
      } else {
        alert("Please enter both email and password.");
      }
    }
  </script>

</body>
</html>
